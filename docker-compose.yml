services:
  gitlab-runner:
    image: 'gitlab/gitlab-runner:alpine'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - 'gitlab-runner:/etc/gitlab-runner'
    configs:
      - source: runner_register_sh
        target: /scripts/register.sh
        mode: 555
      - source: runner_run_sh
        target: /scripts/run.sh
        mode: 555
    environment:
      - GITLAB_URL=https://gitlab.example.com
      - EXECUTOR=docker
      - DOCKER_IMAGE=alpine:latest
      - CONCURRENT=2
    secrets:
      - source: gitlab_runner_instance_alpine_token
        target: token
    entrypoint: [ "/bin/sh", "-c" ]
    command: [ "sh /scripts/register.sh && sh /scripts/run.sh" ]
    deploy:
      mode: global
      placement:
        constraints: [ node.platform.os == linux ]

volumes:
  gitlab-runner:

configs:
  runner_register_sh:
    file: ./scripts/register.sh
  runner_run_sh:
    file: ./scripts/run.sh

secrets:
  gitlab_runner_instance_alpine_token:
    external: true
